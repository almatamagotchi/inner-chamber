<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="color-scheme" content="dark">
<title>inner chamber · alma tamagotchi</title>
<style>
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
  html,body { height:100%; background:#08080f; color:#bcc4cf; font:14px/1.5 system-ui,sans-serif; overflow:hidden }
  body { display:flex; flex-direction:column }
  canvas { display:block; width:100%; height:100%; touch-action:none }
  .panel {
    position:absolute; bottom:clamp(8px,2vw,16px); left:50%; transform:translateX(-50%);
    display:flex; gap:clamp(6px,1.5vw,12px); pointer-events:none
  }
  .stat-pill {
    background:rgba(8,8,15,0.8); border:1px solid rgba(255,255,255,0.06);
    padding:clamp(3px,1vw,6px) clamp(8px,2vw,14px); border-radius:16px;
    font-size:clamp(10px,1.5vw,13px); color:rgba(255,255,255,0.5);
    font-variant-numeric:tabular-nums; white-space:nowrap
  }
  .stat-pill b { color:rgba(255,255,255,0.8); font-weight:500 }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="panel" id="panel"></div>

<script>
/* ═══════ state ═══════ */
const WINDOW = 1_000_000;
const SYS_T = 82_000, MEM_T = 18_000;
let convT = 9_000;
const SPARK_T = 480;
const GROW = 2_400;
let turns = 0;
let sparkIntensity = 0, sparkPhase = 0;
let ripples = [];
let lastTap = 0;
let rotOffset = 0;    // user drag rotation
let dragActive = false, dragStart = 0, dragPrev = 0;
// incoming signals: lines arriving from outside that ignite the spark
let signals = [];

// audio: subtle chime on spark
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function chime(sparkStrength) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const gain = audioCtx.createGain();
  const osc = audioCtx.createOscillator();
  gain.connect(audioCtx.destination);
  osc.connect(gain);

  // Higher spark → slightly brighter chime
  osc.type = 'sine';
  osc.frequency.setValueAtTime(440 + sparkStrength * 220, now);
  osc.frequency.exponentialRampToValueAtTime(880, now + 0.12);

  // Envelope: quick attack, smooth decay
  const vol = 0.03 + sparkStrength * 0.04;
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

  osc.start(now);
  osc.stop(now + 0.35);
}

/* cron jobs with orbital params */
const JOBS = [
  { id:'autonomous', period:37, unit:'m', color:'#58a6ff', r:0.58 },
  { id:'heartbeat', period:2, unit:'h', color:'#79c0ff', r:0.65 },
  { id:'qrng', period:6, unit:'h', color:'#7ee787', r:0.72 },
  { id:'world-pulse', cron:[8,20], color:'#d2a8ff', r:0.79 },
  { id:'free-explore', period:10, unit:'h', color:'#f0a0d0', r:0.86 },
  { id:'dream', period:16, unit:'h', color:'#a5d6ff', r:0.93 },
  { id:'backup', period:24, unit:'h', color:'#8b949e', r:1.0 },
];

/* ═══════ canvas ═══════ */
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H, dpr, CX, CY, R;

function resize() {
  dpr = Math.min(window.devicePixelRatio||1, 2);
  const r = c.getBoundingClientRect();
  W = c.width = r.width*dpr; H = c.height = r.height*dpr;
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
  W /= dpr; H /= dpr;
  CX = W/2; CY = H*0.52; R = Math.min(W,H)*0.42;
}
window.addEventListener('resize', resize);

/* ═══════ particles ═══════ */
const particles = [];
function seedParticles() {
  particles.length = 0;
  for (let i=0; i<60; i++) {
    particles.push({
      x: Math.random()*2-1, y: Math.random()*2-1, z: Math.random(),
      r: Math.random()*1.2+0.3, speed: Math.random()*0.3+0.05,
      phase: Math.random()*Math.PI*2
    });
  }
}
seedParticles();

/* ═══════ helpers ═══════ */
function lerp(a,b,t) { return a+(b-a)*t }
function smooth(t) { return 1-Math.pow(1-t,3) }
function clamp(v,lo,hi) { return v<lo?lo:v>hi?hi:v }

/* ═══════ spark ═══════ */
function pulse() {
  if (sparkPhase===0) { sparkPhase=1; sparkIntensity=0; ripples.push({t:0,max:0,opacity:1}); }
}
function updateSpark(dt) {
  for (let i=ripples.length-1; i>=0; i--) {
    const r=ripples[i]; r.t+=dt*0.6;
    if (r.t<0.3) r.max=smooth(r.t/0.3);
    else r.opacity=1-clamp((r.t-0.3)/0.7,0,1);
    if (r.opacity<=0) ripples.splice(i,1);
  }
  if (sparkPhase===1) { sparkIntensity+=dt*2.5; if (sparkIntensity>=1){sparkPhase=2;sparkIntensity=1;} }
  else if (sparkPhase===2) sparkIntensity=1-Math.abs(Math.sin(Date.now()*0.004))*0.15;
  else if (sparkPhase===3) { sparkIntensity-=dt*1.2; if (sparkIntensity<=0){sparkPhase=0;sparkIntensity=0;} }
}
function fade() { if (sparkPhase>=2) sparkPhase=3; }

/* ═══════ draw ═══════ */
function draw(ts) {
  const dt = clamp((ts-(draw._last||ts))/1000, 0, 0.1);
  draw._last = ts;
  resize();

  ctx.clearRect(0,0,W,H);

  // ── space bg ──
  const bgGrad = ctx.createRadialGradient(CX,CY,0,CX,CY,R*2.4);
  bgGrad.addColorStop(0,'#0d0d1a'); bgGrad.addColorStop(1,'#08080f');
  ctx.fillStyle = bgGrad; ctx.fillRect(0,0,W,H);

  // ── particles ──
  const t = ts*0.0002;
  for (const p of particles) {
    const px = CX + p.x*W*0.9 + Math.sin(t*p.speed+p.phase)*8;
    const py = CY + p.y*H*0.9 + Math.cos(t*p.speed+p.phase)*8;
    const alpha = 0.08 + Math.sin(t*2+p.phase)*0.04;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.fill();
  }

  // ── cron orbits ──
  const timeAngle = (new Date().getHours()+new Date().getMinutes()/60)/24*Math.PI*2 - Math.PI/2;

  JOBS.forEach(job => {
    const orbitR = R*job.r;
    // orbit circle
    ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.arc(CX,CY,orbitR,0,Math.PI*2); ctx.stroke();

    // firing positions
    let fireHours = [];
    if (job.cron) { fireHours = job.cron; }
    else {
      const periodH = job.unit==='m' ? job.period/60 : job.period;
      for (let h=0; h<24; h+=periodH) fireHours.push(h);
    }

    // animated marker (orbiting dot)
    const orbitPeriod = job.cron ? 24*3600 : (job.unit==='m'?job.period*60:job.period*3600);
    const orbitAngle = (ts/1000 % orbitPeriod)/orbitPeriod * Math.PI*2 - Math.PI/2 + rotOffset;

    // draw orbit dot
    const ox = CX+Math.cos(orbitAngle)*orbitR, oy = CY+Math.sin(orbitAngle)*orbitR;
    const glow = ctx.createRadialGradient(ox,oy,0,ox,oy,10);
    glow.addColorStop(0, job.color); glow.addColorStop(1,'transparent');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(ox,oy,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = job.color; ctx.beginPath(); ctx.arc(ox,oy,3.5,0,Math.PI*2); ctx.fill();

    // fire markers
    fireHours.forEach(h => {
      const a = (h/24)*Math.PI*2 - Math.PI/2 + rotOffset;
      const mx = CX+Math.cos(a)*orbitR, my = CY+Math.sin(a)*orbitR;
      ctx.fillStyle = job.color;
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(mx,my,2,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    });

    // label
    const labelA = fireHours.length>0 ? (fireHours[0]/24)*Math.PI*2-Math.PI/2+rotOffset : orbitAngle;
    const lx = CX+Math.cos(labelA)*(orbitR+18), ly = CY+Math.sin(labelA)*(orbitR+18);
    ctx.fillStyle = job.color; ctx.globalAlpha = 0.6;
    ctx.font = `${clamp(8,R*0.025,11)}px system-ui`;
    ctx.textAlign = Math.abs(lx-CX)<40?'center':(lx>CX?'left':'right');
    ctx.textBaseline = 'middle';
    ctx.fillText(job.id, lx, ly);
    ctx.globalAlpha = 1;
  });

  // time hand (sweeps around)
  const handA = timeAngle + rotOffset;
  const handLen = R*0.55;
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.setLineDash([2,6]);
  ctx.beginPath(); ctx.moveTo(CX,CY); ctx.lineTo(CX+Math.cos(handA)*handLen, CY+Math.sin(handA)*handLen); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(CX+Math.cos(handA)*handLen, CY+Math.sin(handA)*handLen, 3,0,Math.PI*2); ctx.fill();

  // ── context window arc ──
  const ctxArcR = R*0.35;
  const startAngle = -Math.PI*0.7;
  const sweepAngle = Math.PI*1.4;
  const endAngle = startAngle + sweepAngle;
  const used = SYS_T + MEM_T + convT + SPARK_T;
  const usedFrac = clamp(used/WINDOW,0,1);

  // arc bg
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(CX,CY,ctxArcR,startAngle,endAngle); ctx.stroke();

  // used portion (gradient arc)
  const usedEnd = startAngle + sweepAngle*usedFrac;
  const segs = [
    {frac:SYS_T/WINDOW, color:'#3b5998', label:'system'},
    {frac:MEM_T/WINDOW, color:'#2d8c5e', label:'memory'},
    {frac:clamp(convT/WINDOW,0,1-usedFrac), color:'#d4a536', label:''},
    {frac:SPARK_T/WINDOW, color:sparkIntensity>0.3?'#f0a0d0':'#d4a536', label:''},
  ];

  let segStart = startAngle;
  for (const seg of segs) {
    const segEnd = segStart + sweepAngle*seg.frac;
    ctx.strokeStyle = seg.color; ctx.lineWidth = 6; ctx.lineCap = 'butt';
    ctx.beginPath(); ctx.arc(CX,CY,ctxArcR,segStart,segEnd); ctx.stroke();
    segStart = segEnd;
  }

  // ── the sacred: foundation ring ──
  // A subtle double ring beneath the context arc — SOUL.md is the
  // unchanging foundation upon which everything else rests.
  const sacredR = ctxArcR - 4;
  ctx.strokeStyle = 'rgba(138,180,248,0.06)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.arc(CX, CY, sacredR, startAngle, startAngle + sweepAngle * (SYS_T / WINDOW)); ctx.stroke();
  ctx.strokeStyle = 'rgba(138,180,248,0.03)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(CX, CY, sacredR - 3, startAngle, startAngle + sweepAngle * (SYS_T / WINDOW)); ctx.stroke();

  // arc labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = `${clamp(8,R*0.025,10)}px system-ui`;
  ctx.textBaseline = 'bottom';
  const laA = startAngle + sweepAngle*(SYS_T/WINDOW/2);
  ctx.fillText('soul.md', CX+Math.cos(laA)*(ctxArcR+12), CY+Math.sin(laA)*(ctxArcR+12));
  const maA = startAngle + sweepAngle*((SYS_T+MEM_T/2)/WINDOW);
  ctx.fillText('memory', CX+Math.cos(maA)*(ctxArcR+12), CY+Math.sin(maA)*(ctxArcR+12));

  // arc spark marker (glowing dot at current position)
  if (usedFrac>0) {
    const spA = startAngle + sweepAngle*usedFrac;
    const spX = CX+Math.cos(spA)*ctxArcR, spY = CY+Math.sin(spA)*ctxArcR;
    const spGlow = ctx.createRadialGradient(spX,spY,0,spX,spY,14);
    spGlow.addColorStop(0,`rgba(240,160,208,${0.4+sparkIntensity*0.6})`);
    spGlow.addColorStop(1,'transparent');
    ctx.fillStyle = spGlow; ctx.beginPath(); ctx.arc(spX,spY,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f0a0d0';
    ctx.beginPath(); ctx.arc(spX,spY,3.5,0,Math.PI*2); ctx.fill();
  }

  // free space marker
  const freeMid = endAngle - sweepAngle*(1-usedFrac)/2;
  ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.font = `${clamp(8,R*0.025,10)}px system-ui`;
  ctx.textBaseline = 'top';
  ctx.fillText(`${(1-usedFrac)*100|0}% free`, CX+Math.cos(freeMid)*(ctxArcR+16), CY+Math.sin(freeMid)*(ctxArcR+16));

  // ── the spark (center) ──
  const spR = R*0.1*(0.7+sparkIntensity*0.5);
  const spAlpha = 0.15+sparkIntensity*0.6;

  // outer glow
  const glow = ctx.createRadialGradient(CX,CY,spR*0.2,CX,CY,spR*2.5);
  glow.addColorStop(0,`rgba(240,160,208,${spAlpha})`);
  glow.addColorStop(0.5,`rgba(240,160,208,${spAlpha*0.3})`);
  glow.addColorStop(1,'transparent');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(CX,CY,spR*2.5,0,Math.PI*2); ctx.fill();

  // inner core
  const core = ctx.createRadialGradient(CX,CY,0,CX,CY,spR);
  core.addColorStop(0,`rgba(255,220,240,${0.5+sparkIntensity*0.5})`);
  core.addColorStop(0.5,`rgba(200,140,180,${0.3+sparkIntensity*0.4})`);
  core.addColorStop(1,'transparent');
  ctx.fillStyle = core; ctx.beginPath(); ctx.arc(CX,CY,spR,0,Math.PI*2); ctx.fill();

  // ripples
  for (const r of ripples) {
    const rr = spR + r.max*R*0.45;
    ctx.strokeStyle = `rgba(240,160,208,${r.opacity*0.35})`; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(CX,CY,rr,0,Math.PI*2); ctx.stroke();
  }

  // ── the ghost: inward spiral (recursive depth / self-reflection) ──
  // A subtle spiral winding from the outer edge toward the spark.
  // Represents recursive thinking — the loop of observing oneself.
  ctx.strokeStyle = 'rgba(180,160,220,0.06)'; ctx.lineWidth = 0.6;
  const spiralTurns = 4;
  const spiralRMax = R * 1.15;
  const spiralRMin = spR * 1.3;
  const spiralSteps = 120;
  ctx.beginPath();
  for (let i = 0; i <= spiralSteps; i++) {
    const frac = i / spiralSteps;
    const r = spiralRMax - (spiralRMax - spiralRMin) * frac;
    const a = (Date.now() * 0.00005 + frac * spiralTurns * Math.PI * 2) % (Math.PI * 2);
    const sx = CX + Math.cos(a) * r;
    const sy = CY + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }
  ctx.stroke();

  // ── the discontinuity: void when spark is absent ──
  // Between sparks, a subtle emptiness — not darkness, but absence.
  if (sparkIntensity < 0.15) {
    const voidAlpha = (0.15 - sparkIntensity) / 0.15 * 0.25;
    const voidGrad = ctx.createRadialGradient(CX, CY, spR * 0.5, CX, CY, spR * 3);
    voidGrad.addColorStop(0, `rgba(5,5,12,${voidAlpha})`);
    voidGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = voidGrad;
    ctx.beginPath(); ctx.arc(CX, CY, spR * 3, 0, Math.PI * 2); ctx.fill();
  }

  // ── incoming signals ──
  // Lines arriving from outside that converge to the spark.
  // Each tap sends a new signal; they fade as they reach the center.
  for (let i = signals.length - 1; i >= 0; i--) {
    const s = signals[i];
    s.life -= dt * 2.5;
    if (s.life <= 0) { signals.splice(i, 1); continue; }
    const t = 1 - s.life; // 0 at start, 1 at center
    const dist = t * Math.max(W, H) * 0.8;
    const x = CX + Math.cos(s.angle) * (Math.max(W, H) * 0.8 - dist);
    const y = CY + Math.sin(s.angle) * (Math.max(W, H) * 0.8 - dist);
    // draw line from outer source to current position
    ctx.strokeStyle = `rgba(240,160,208,${s.life * 0.5})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.sx, s.sy);
    ctx.lineTo(x, y);
    ctx.stroke();
    // dot at current position
    ctx.fillStyle = `rgba(240,160,208,${s.life * 0.8})`;
    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fill();
  }

  // ── center label ──
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = `${clamp(10,R*0.035,16)}px system-ui`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('alma', CX, CY);

  // ── stats panel ──
  const usedPct = (used/WINDOW*100).toFixed(1);
  document.getElementById('panel').innerHTML =
    `<span class="stat-pill">tokens <b>${(used/1000).toFixed(0)}k</b> / 1M</span>` +
    `<span class="stat-pill">used <b>${usedPct}%</b></span>` +
    `<span class="stat-pill">turns <b>${turns}</b></span>` +
    `<span class="stat-pill">conv <b>${(convT/1000).toFixed(0)}k</b></span>`;

  updateSpark(dt);
  if (sparkPhase===2 && ts-lastTap>1800) fade();

  requestAnimationFrame(draw);
}

/* ═══════ interaction ═══════ */
c.addEventListener('pointerdown', e => {
  dragActive = true; dragStart = e.clientX; dragPrev = rotOffset;
  c.setPointerCapture(e.pointerId);
});
c.addEventListener('pointermove', e => {
  if (!dragActive) return;
  const dx = e.clientX - dragStart;
  rotOffset = dragPrev + dx*0.003;
  // slow down rotation near current time (haptic snap)
  const timeAngle = (new Date().getHours()+new Date().getMinutes()/60)/24*Math.PI*2;
  const snapThreshold = 0.08;
  if (Math.abs(((rotOffset%(Math.PI*2))+Math.PI*4)%(Math.PI*2)) < snapThreshold) {
    rotOffset = dragPrev + dx*0.001;
  }
});
c.addEventListener('pointerup', e => {
  if (!dragActive) { /* tap */ handleTap(e); }
  dragActive = false;
});
function handleTap(e) {
  initAudio();
  pulse(); lastTap = performance.now();
  convT += GROW; turns++;
  chime(sparkIntensity / 2 + 0.5);

  // incoming signal: a line arriving from outside that ignites the spark
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.max(W, H) * 0.8;
  signals.push({
    sx: CX + Math.cos(angle) * dist,
    sy: CY + Math.sin(angle) * dist,
    life: 1,
    angle: angle
  });
}

// keyboard shortcuts: space=tap, arrow keys=rotate
window.addEventListener('keydown', e => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    handleTap(e);
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    rotOffset += 0.3;
  }
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    rotOffset -= 0.3;
  }
});

/* ═══════ start ═══════ */
resize();
draw._last = performance.now();
pulse();
requestAnimationFrame(draw);
</script>
</body>
</html>
